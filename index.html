<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Open Space</title>
    <link rel="icon" type="image/svg+xml" href="data/favicon.svg" />
    <link rel="shortcut icon" href="data/favicon.ico" />
    <link rel="stylesheet" href="style.min.css">
</head>
<body style="background-color: #020202">

    <!-- Header --------------------------------------------------->
    <header class="header w-full flex justify-between items-center">
        <div class="objects flex items-center gap-8 hide-mobile">
            <span class="p light-gray">Space Objects</span>
            <span class="data p bg-darkgray border rounded white" id="sat-count">00000<span>
        </div>
        <div class="logo flex items-center gap-8 white">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M10.665 7.014c-3.173.847-5.826 2.246-7.558 3.778-1.78 1.576-2.363 3.067-2.07 4.167.295 1.1 1.543 2.102 3.872 2.58 2.265.466 5.263.357 8.435-.49s5.826-2.246 7.557-3.779c1.78-1.575 2.364-3.066 2.07-4.166l.93-.249.038.154c.695 3.258-3.879 7.244-10.347 8.971-6.57 1.754-12.608.513-13.485-2.772-.877-3.286 3.738-7.371 10.309-9.125s12.609-.513 13.486 2.772l-.931.249C22.677 8.004 21.428 7 19.1 6.523c-2.265-.466-5.263-.356-8.435.49" fill="currentColor"/><path d="M15.671 8.34C13.35 6.02 10.81 4.422 8.616 3.691c-2.255-.752-3.838-.51-4.643.296-.805.805-1.047 2.387-.295 4.642.731 2.194 2.327 4.734 4.649 7.056s4.862 3.918 7.056 4.649c2.254.752 3.837.51 4.642-.295l.682.681-.116.11c-2.471 2.233-8.212.27-12.946-4.464C2.837 11.557.887 5.71 3.292 3.306 5.696.9 11.544 2.85 16.352 7.658c4.81 4.809 6.759 10.657 4.355 13.061l-.682-.681c.805-.806 1.047-2.388.296-4.643-.732-2.194-2.328-4.734-4.65-7.056" fill="currentColor"/><path d="M17.075 13.349c.852-3.171.967-6.169.506-8.435-.475-2.329-1.474-3.58-2.574-3.875-1.1-.296-2.592.285-4.17 2.062C9.3 4.83 7.897 7.48 7.044 10.65s-.968 6.169-.506 8.435c.474 2.329 1.474 3.58 2.573 3.875l-.25.93-.152-.045c-3.17-1.026-4.334-6.98-2.596-13.445C7.88 3.833 11.973-.775 15.257.108s4.514 6.923 2.748 13.49-5.86 11.177-9.144 10.294l.25-.93c1.1.295 2.592-.286 4.171-2.063 1.536-1.729 2.94-4.38 3.793-7.55" fill="currentColor"/></svg>
            <span class="h1 white">Open Space</div>
        </div>
        <div class="links flex justify-end">
            <a href="https://github.com/kspangdg/Open-Space" target="_blank" rel="noopener" class="gray">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="18" viewBox="0 0 16 18" fill="none"><path d="M11.025 16.625v-3.2a3.84 3.84 0 0 0-.8-2.8c2.4 0 4.8-1.6 4.8-4.4.064-1-.216-1.984-.8-2.8.224-.92.224-1.88 0-2.8 0 0-.8 0-2.4 1.2-2.112-.4-4.288-.4-6.4 0-1.6-1.2-2.4-1.2-2.4-1.2-.24.92-.24 1.88 0 2.8a4.32 4.32 0 0 0-.8 2.8c0 2.8 2.4 4.4 4.8 4.4a3.77 3.77 0 0 0-.8 2.8v3.2" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/><path d="M6.225 13.425c-3.608 1.6-4-1.6-5.6-1.6" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </a>
        </div>
    </header>

    <!-- Body ----------------------------------------------------->
    <div id="root"></div>

    <!-- Footer --------------------------------------------------->
    <footer class="footer w-full flex justify-between items-center">
        <div class="speed flex items-center gap-20 hide-mobile">
            <label class="flex items-center gap-8">
                <span class="p light-gray">Simulation Speed</span>
                <span class="data p bg-darkgray border rounded white" id="speed-label">005x<span>
            </label>
            <input id="speed-slider" type="range" min="1" max="100" value="5"/>
        </div>
        <div class="hint p gray">Drag to rotate &nbsp;-&nbsp; <span class="hide-mobile">Scroll</span><span class="show-mobile">Pinch</span> to zoom</div>
        <div class="version p gray flex justify-end hide-mobile">Version 0.1.0</div>
    </footer>

    <!-- Scripts -------------------------------------------------->
    <script src="js/vendor/three.min.js"></script>
    <script src="data/tle.js"></script>
    <script src="app.min.js"></script>

</body>
</html>
